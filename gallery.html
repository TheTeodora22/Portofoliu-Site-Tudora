<script>
  (function() {
    const base = document.createElement("base");

    // Domeniul curent (ex: https://theteodora22.github.io sau http://127.0.0.1:5500)
    const origin = window.location.origin;

    // Verificăm dacă suntem pe GitHub Pages (hostname conține github.io)
    if (window.location.hostname.includes("github.io")) {
      // pe GitHub Pages adăugăm subfolderul repo-ului
      base.href = origin + "/Portofoliu-Site-Tudora/";
    } else {
      // local (VSCode Live Server, localhost, 127.0.0.1 etc.)
      // construim automat baza actualului director
      const path = window.location.pathname.split("/").slice(0, -1).join("/") + "/";
      base.href = origin + path;
    }

    // Adaugăm <base> înainte de orice altceva din <head>
    document.head.prepend(base);
  })();
</script>
